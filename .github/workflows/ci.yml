name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify-package:
    name: Verify distributable package
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate and package
        shell: pwsh
        run: ./scripts/verify-package.ps1 -OutputDirectory artifacts

      - name: Dice tools contract test
        shell: pwsh
        run: ./scripts/test-dice-contract.ps1

      - name: State healthcheck tools contract test
        shell: pwsh
        run: ./scripts/test-healthcheck-contract.ps1

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: worldthread-package
          path: artifacts/*.zip
          if-no-files-found: error
