name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Verify, package, and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate and package
        shell: pwsh
        run: ./scripts/verify-package.ps1 -OutputDirectory artifacts

      - name: Check tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $manifest = Get-Content -Raw dist/worldthread-solo-adventure-template/template.json | ConvertFrom-Json
          $expected = "v$($manifest.version)"
          if ('${{ github.ref_name }}' -ne $expected) {
            throw "Tag ${{ github.ref_name }} does not match template.json version ($expected)."
          }

      - name: Create SHA-256 checksum
        shell: pwsh
        run: |
          $zip = Get-ChildItem artifacts/*.zip | Select-Object -First 1
          $hash = (Get-FileHash $zip.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($zip.Name)" | Out-File -Encoding ascii "$($zip.FullName).sha256"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $manifest = Get-Content -Raw dist/worldthread-solo-adventure-template/template.json | ConvertFrom-Json
          $zipPath = "artifacts/worldthread-solo-adventure-template-v$($manifest.version).zip"
          $ghArgs = @('release', 'create', '${{ github.ref_name }}',
                      $zipPath, "$zipPath.sha256",
                      '--title', 'Worldthread ${{ github.ref_name }}',
                      '--verify-tag', '--generate-notes')
          if ($manifest.version -match '-') { $ghArgs += '--prerelease' }
          gh @ghArgs

      - name: Upload dry-run artifact (manual runs only)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: worldthread-release-dry-run
          path: artifacts/*
          if-no-files-found: error
