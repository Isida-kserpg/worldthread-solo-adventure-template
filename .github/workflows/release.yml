name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Verify, package, and publish release
    runs-on: ubuntu-latest
    # Context values enter scripts only via env, never inline in run: text
    # (tag names may contain quote/backtick characters — injection surface).
    env:
      TAG_NAME: ${{ github.ref_name }}
      IS_TAG_PUSH: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate and package
        shell: pwsh
        run: ./scripts/verify-package.ps1 -OutputDirectory artifacts

      - name: Check tag matches manifest version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $manifest = Get-Content -Raw dist/worldthread-solo-adventure-template/template.json | ConvertFrom-Json
          $expected = "v$($manifest.version)"
          if ($env:TAG_NAME -ne $expected) {
            throw "Tag $($env:TAG_NAME) does not match template.json version ($expected)."
          }

      - name: Create SHA-256 checksum
        shell: pwsh
        run: |
          $zip = Get-ChildItem artifacts/*.zip | Select-Object -First 1
          $hash = (Get-FileHash $zip.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($zip.Name)" | Out-File -Encoding ascii "$($zip.FullName).sha256"

      - name: Publish GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $manifest = Get-Content -Raw dist/worldthread-solo-adventure-template/template.json | ConvertFrom-Json
          $zipPath = "artifacts/worldthread-solo-adventure-template-v$($manifest.version).zip"
          $ghArgs = @('release', 'create', $env:TAG_NAME,
                      $zipPath, "$zipPath.sha256",
                      '--title', "Worldthread $($env:TAG_NAME)",
                      '--verify-tag', '--generate-notes')
          # Prerelease only for a SemVer prerelease segment; a hyphen inside
          # build metadata (after +) is a normal release.
          if ($manifest.version -match '^[^+]*-') { $ghArgs += '--prerelease' }
          gh @ghArgs

      - name: Upload dry-run artifact (manual runs only)
        if: env.IS_TAG_PUSH != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: worldthread-release-dry-run
          path: artifacts/*
          if-no-files-found: error
